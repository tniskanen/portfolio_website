  <section class="projects-section contact-section">
    <h3 class="contact-heading">Let's Connect!</h3>
    <form method="post" action="https://webdevbasics.net/scripts/pacific.php">
    <p>Required fields are marked with an asterisk *.</p>
    
    <label for="myFName">*Name:</label>
    <input type="text" id="myFName" name="myFName" required>

    <label for="myEmail">*E-Mail Address:</label>
    <input type="email" id="myEmail" name="myEmail" required>

    <label for="myPhone">Phone Number:</label>
    <input type="tel" id="myPhone" name="myPhone" maxlength="12">

    <label for="mySubject">Subject:</label>
    <input type="text" id="mySubject" name="mySubject">

    <label for="myComments">*Comments:</label>
    <textarea id="myComments" name="myComments" rows="2" cols="30"></textarea>

    <input type="submit" value="Submit">
  </form>
